services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env}
    command: /app/run-dev.sh
    volumes:
      - ./backend/app:/app/app
      - ~/.aws:/root/.aws:ro
      - ${HOME}/workspace/pem:/root/.ssh/pem:ro
    environment:
      AWS_REGION: sa-east-1
      INFERENCE_SERVICE_SCHEME: http
      INFERENCE_SERVICE_HOST: inference
      INFERENCE_SERVICE_PORT: 8001
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "8000:8000"
    networks:
      - valeVision
      - networkMysql

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host 0.0.0.0 --port 5174
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    ports:
      - "5174:5174"
    environment:
      VITE_DEV_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    depends_on:
      - backend
    networks:
      - valeVision

  inference:
    build:
      context: ./inference
      dockerfile: Dockerfile
    env_file:
      - ./inference/.env
    command: sh /app/run_service.sh
    volumes:
      - ./inference:/app
      - ../cameras:/data/cameras:ro
      - ../vale_sa/PACOTE_PILOTO_VM/PRODUTO_VOLUMETRIA_RELEASE_V8/models:/app/model:ro
      - ~/.aws:/root/.aws:ro
      - ./samples:/app/samples:ro
      - ${HOME}/workspace/pem:/root/.ssh/pem:ro
    environment:
      AWS_REGION: sa-east-1
      PYTHONUNBUFFERED: "1"
    ports:
      - "8001:8001"
    depends_on:
      - backend
    networks:
      - valeVision

networks:
  valeVision:
    driver: bridge

  networkMysql:
    external: true
    name: mysql_networkMysql
