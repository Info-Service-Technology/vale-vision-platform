name: Deploy Vale Vision

on:
  push:
    branches:
      - main  
    paths:
      - "backend/**"
      - "frontend/**"
      - "inference/**"
      - "infraestructure/terraform/**"
      - ".github/workflows/terraform.yml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-vale-vision-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: sa-east-1
      ECR_BACKEND_REPOSITORY: ${{ vars.ECR_BACKEND_REPOSITORY_VISION }}
      ECR_INFERENCE_REPOSITORY: ${{ vars.ECR_INFERENCE_REPOSITORY_VISION }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER_NAME_VISION }}
      ECS_BACKEND_SERVICE: ${{ vars.ECS_BACKEND_SERVICE_NAME_VISION }}
      ECS_INFERENCE_SERVICE: ${{ vars.ECS_INFERENCE_SERVICE_NAME_VISION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend build into backend
        run: |
          rm -rf ./backend/app/web
          mkdir -p ./backend/app/web
          cp -r ./frontend/dist/. ./backend/app/web/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN_VISION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if aws ecr describe-images \
            --repository-name "$ECR_BACKEND_REPOSITORY" \
            --image-ids imageTag="$IMAGE_TAG" >/dev/null 2>&1; then
            echo "Backend image $ECR_BACKEND_REPOSITORY:$IMAGE_TAG already exists. Skipping push."
          else
            docker build -t $REGISTRY/$ECR_BACKEND_REPOSITORY:$IMAGE_TAG ./backend
            docker push $REGISTRY/$ECR_BACKEND_REPOSITORY:$IMAGE_TAG
          fi

      - name: Build and push inference image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if aws ecr describe-images \
            --repository-name "$ECR_INFERENCE_REPOSITORY" \
            --image-ids imageTag="$IMAGE_TAG" >/dev/null 2>&1; then
            echo "Inference image $ECR_INFERENCE_REPOSITORY:$IMAGE_TAG already exists. Skipping push."
          else
            docker build -t $REGISTRY/$ECR_INFERENCE_REPOSITORY:$IMAGE_TAG ./inference
            docker push $REGISTRY/$ECR_INFERENCE_REPOSITORY:$IMAGE_TAG
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./infraestructure/terraform/envs/prd
        run: terraform init

      - name: Terraform Format Check
        working-directory: ./infraestructure/terraform/envs/prd
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ./infraestructure/terraform/envs/prd
        run: terraform validate

      - name: Terraform Apply
        working-directory: ./infraestructure/terraform/envs/prd
        env:
          TF_VAR_backend_image_tag: ${{ github.sha }}
          TF_VAR_inference_image_tag: ${{ github.sha }}

          # Terraform variable db_password recebe o secret específico do Vale Vision
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD_VISION }}

          # SMTP compartilhado
          TF_VAR_smtp_password: ${{ secrets.TF_VAR_SMTP_PASSWORD }}

        run: |
          terraform apply -auto-approve -input=false
        
